<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini AI Bot Platform</title>
<style>
  body {
    margin:0; padding:0;
    background:#0f172a; color:#e5e7eb;
    font-family:system-ui;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
  }
  .app {
    width:100%; max-width:900px;
    background:#020617; padding:16px;
    border-radius:12px; box-shadow:0 20px 40px rgba(0,0,0,.6);
    display:grid; grid-template-columns:1fr 1fr; gap:16px;
  }
  h2 { margin:0 0 8px 0; }
  .panel {
    border:1px solid #1f2937;
    border-radius:8px; padding:8px;
    display:flex; flex-direction:column; gap:8px;
  }
  .bot-list-item {
    padding:6px; border-radius:6px;
    background:#0b1120; margin-bottom:4px;
    cursor:pointer; font-size:0.9rem;
  }
  .bot-list-item.active { border:1px solid #38bdf8; }
  .field {
    display:flex; flex-direction:column; gap:4px;
    font-size:0.85rem;
  }
  input, select, textarea {
    padding:6px; border-radius:6px;
    border:1px solid #1f2937;
    background:#020617; color:#e5e7eb;
    font-size:0.85rem;
  }
  button {
    padding:6px 10px; border-radius:6px;
    border:none; background:#38bdf8;
    color:#0f172a; font-weight:600;
    cursor:pointer; font-size:0.85rem;
  }
  .chat-log {
    flex:1; min-height:200px; max-height:260px;
    overflow-y:auto; padding:6px;
    border-radius:6px; border:1px solid #1f2937;
    font-size:0.85rem;
  }
  .msg-user { color:#a5b4fc; margin-bottom:4px; }
  .msg-ai { color:#22c55e; margin-bottom:4px; }
</style>
</head>
<body>

<div class="app">
  <!-- Left: Home / Bot list / Creator -->
  <div class="panel">
    <h2>AI Bot Platform</h2>
    <div class="field">
      <label>Bot name</label>
      <input id="botName" placeholder="e.g. StoryWeaver">
    </div>
    <div class="field">
      <label>Personality</label>
      <select id="botPersonality">
        <option value="neutral">Neutral</option>
        <option value="friendly">Friendly</option>
        <option value="serious">Serious</option>
      </select>
    </div>
    <div class="field">
      <label>Story mode</label>
      <select id="botStoryMode">
        <option value="false">Off</option>
        <option value="true">On</option>
      </select>
    </div>
    <button id="createBotBtn">Create bot</button>

    <hr>

    <h3>Your bots</h3>
    <div id="botList"></div>
  </div>

  <!-- Right: Chat UI -->
  <div class="panel">
    <h2 id="activeBotTitle">No bot selected</h2>
    <div class="chat-log" id="chatLog"></div>
    <div class="field">
      <label>Message</label>
      <input id="chatInput" placeholder="Talk to the bot..." />
    </div>
    <button id="sendMsgBtn">Send</button>
  </div>
</div>

<script type="module">
  import { AIEngine } from './ai.js';

  const bots = {}; // id -> { name, personality, storyMode, engine, chats }
  let activeBotId = null;

  const botNameEl = document.getElementById('botName');
  const botPersonalityEl = document.getElementById('botPersonality');
  const botStoryModeEl = document.getElementById('botStoryMode');
  const createBotBtn = document.getElementById('createBotBtn');
  const botListEl = document.getElementById('botList');

  const activeBotTitleEl = document.getElementById('activeBotTitle');
  const chatLogEl = document.getElementById('chatLog');
  const chatInputEl = document.getElementById('chatInput');
  const sendMsgBtn = document.getElementById('sendMsgBtn');

  function renderBots() {
    botListEl.innerHTML = '';
    Object.keys(bots).forEach(id => {
      const bot = bots[id];
      const div = document.createElement('div');
      div.className = 'bot-list-item' + (id === activeBotId ? ' active' : '');
      div.textContent = `${bot.name} • chats: ${bot.chats}`;
      div.onclick = () => {
        activeBotId = id;
        activeBotTitleEl.textContent = bot.name;
        chatLogEl.innerHTML = '';
        renderBots();
      };
      botListEl.appendChild(div);
    });
  }

  createBotBtn.onclick = () => {
    const name = botNameEl.value.trim();
    if (!name) return;

    const personality = botPersonalityEl.value;
    const storyMode = botStoryModeEl.value === 'true';

    const id = Date.now().toString();
    const engine = new AIEngine({ personality, storyMode });

    bots[id] = {
      id,
      name,
      personality,
      storyMode,
      engine,
      chats: 0
    };

    botNameEl.value = '';
    renderBots();
  };

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = type === 'user' ? 'msg-user' : 'msg-ai';
    div.textContent = (type === 'user' ? 'You: ' : 'Bot: ') + text;
    chatLogEl.appendChild(div);
    chatLogEl.scrollTop = chatLogEl.scrollHeight;
  }

  sendMsgBtn.onclick = () => {
    if (!activeBotId) return;
    const bot = bots[activeBotId];
    const text = chatInputEl.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    const reply = bot.engine.respond(text);
    addMsg(reply, 'ai');

    bot.chats++;
    chatInputEl.value = '';
    renderBots();
  };
</script>

</body>
  </html>
