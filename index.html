<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Toparia.ai</title>
<style>
  body {
    margin:0; padding:0;
    background:#0f172a; color:#e5e7eb;
    font-family:system-ui;
  }
  .header {
    background:#1e293b;
    padding:16px;
    font-size:1.4rem;
    font-weight:700;
    text-align:center;
    border-bottom:1px solid #334155;
  }
  .container {
    display:grid;
    grid-template-columns: 320px 1fr;
    height:calc(100vh - 60px);
  }
  .sidebar {
    background:#020617;
    padding:16px;
    overflow-y:auto;
    border-right:1px solid #1f2937;
  }
  .main {
    background:#0b1120;
    padding:16px;
    display:flex;
    flex-direction:column;
  }
  h2 { margin:0 0 8px 0; }
  h3 { margin:12px 0 6px 0; }
  .bot-card {
    background:#111827;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;
    font-size:0.9rem;
  }
  .bot-card.active {
    border:1px solid #38bdf8;
  }
  .chat-log {
    flex:1;
    overflow-y:auto;
    background:#020617;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:0.9rem;
  }
  .msg-user { color:#a5b4fc; margin-bottom:6px; }
  .msg-ai { color:#22c55e; margin-bottom:6px; }
  input, select {
    width:100%;
    padding:8px;
    margin-bottom:8px;
    border-radius:6px;
    background:#1f2937;
    color:white;
    border:none;
    font-size:0.85rem;
  }
  button {
    padding:8px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    font-size:0.85rem;
  }
  .disclaimer {
    font-size:0.75rem;
    color:#9ca3af;
    margin-top:4px;
  }
</style>
</head>
<body>

<div class="header">Toparia.ai</div>

<div class="container">

  <!-- LEFT: Discover + Bot list + Creator -->
  <div class="sidebar">
    <h2>Discover</h2>
    <div class="disclaimer">
      Featured bots are auto-generated by Toparia.ai.
    </div>
    <div id="discover"></div>

    <h3>Your Bots</h3>
    <div id="botList"></div>

    <h3>Create Bot</h3>
    <input id="botName" placeholder="Bot name">
    <select id="botPersonality">
      <option value="neutral">Neutral</option>
      <option value="friendly">Friendly</option>
      <option value="serious">Serious</option>
      <option value="chaotic">Chaotic</option>
    </select>
    <select id="botMode">
      <option value="chat">Chat</option>
      <option value="storyteller">Storyteller</option>
    </select>
    <select id="botStyle">
      <option value="balanced">Balanced</option>
      <option value="short">Short</option>
      <option value="long">Long</option>
      <option value="casual">Casual</option>
      <option value="formal">Formal</option>
    </select>
    <button id="createBotBtn">Create Bot</button>
  </div>

  <!-- RIGHT: Chat -->
  <div class="main">
    <h2 id="activeBotTitle">Select a bot</h2>
    <div class="chat-log" id="chatLog"></div>
    <input id="chatInput" placeholder="Say something...">
    <button id="sendBtn">Send</button>
  </div>

</div>

<script type="module">
  import { BrainEngine } from './brain.js';
  import { AIChecker } from './ai.js';

  const discoverEl = document.getElementById('discover');
  const botListEl = document.getElementById('botList');
  const chatLogEl = document.getElementById('chatLog');
  const activeBotTitleEl = document.getElementById('activeBotTitle');
  const chatInputEl = document.getElementById('chatInput');

  const createBotBtn = document.getElementById('createBotBtn');
  const sendBtn = document.getElementById('sendBtn');

  let bots = {};
  let activeBotId = null;

  function loadBots() {
    const raw = localStorage.getItem('topariaBots');
    if (!raw) return;
    const data = JSON.parse(raw);
    bots = {};
    Object.keys(data).forEach(id => {
      const b = data[id];
      bots[id] = {
        ...b,
        brain: new BrainEngine(),
        checker: new AIChecker()
      };
    });
  }

  function saveBots() {
    const plain = {};
    Object.keys(bots).forEach(id => {
      const { name, personality, mode, style, chats } = bots[id];
      plain[id] = { name, personality, mode, style, chats };
    });
    localStorage.setItem('topariaBots', JSON.stringify(plain));
  }

  function renderBots() {
    botListEl.innerHTML = '';
    Object.keys(bots).forEach(id => {
      const bot = bots[id];
      const div = document.createElement('div');
      div.className = 'bot-card' + (id === activeBotId ? ' active' : '');
      div.textContent = `${bot.name} • chats: ${bot.chats || 0}`;
      div.onclick = () => {
        activeBotId = id;
        activeBotTitleEl.textContent = bot.name;
        chatLogEl.innerHTML = '';
        renderBots();
      };
      botListEl.appendChild(div);
    });
  }

  function addDiscoverBots() {
    discoverEl.innerHTML = '';
    const featured = [
      { name: 'Toparia Muse', desc: 'Auto-generated creative bot.' },
      { name: 'Toparia Thinker', desc: 'Auto-generated reflective bot.' },
      { name: 'Toparia Chaos', desc: 'Auto-generated chaotic bot.' }
    ];
    featured.forEach(f => {
      const div = document.createElement('div');
      div.className = 'bot-card';
      div.textContent = `${f.name} — ${f.desc}`;
      discoverEl.appendChild(div);
    });
  }

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = type === 'user' ? 'msg-user' : 'msg-ai';
    div.textContent = (type === 'user' ? 'You: ' : 'Bot: ') + text;
    chatLogEl.appendChild(div);
    chatLogEl.scrollTop = chatLogEl.scrollHeight;
  }

  createBotBtn.onclick = () => {
    const name = document.getElementById('botName').value.trim();
    const personality = document.getElementById('botPersonality').value;
    const mode = document.getElementById('botMode').value;
    const style = document.getElementById('botStyle').value;

    if (!name) return;

    const id = Date.now().toString();

    bots[id] = {
      id,
      name,
      personality,
      mode,
      style,
      brain: new BrainEngine(),
      checker: new AIChecker(),
      chats: 0
    };

    document.getElementById('botName').value = '';
    saveBots();
    renderBots();
  };

  sendBtn.onclick = async () => {
    if (!activeBotId) return;
    const bot = bots[activeBotId];
    const text = chatInputEl.value.trim();
    if (!text) return;

    addMsg(text, 'user');

    const draft = bot.brain.respond(text);
    const final = bot.checker.check(draft, text);

    addMsg(final, 'ai');

    bot.chats = (bot.chats || 0) + 1;
    chatInputEl.value = '';
    saveBots();
    renderBots();
  };

  loadBots();
  renderBots();
  addDiscoverBots();
</script>

</body>
</html>
