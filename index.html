<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Free AI Bot Platform</title>
<style>
  body {
    margin:0; padding:0;
    background:#0f172a; color:#e5e7eb;
    font-family:system-ui;
  }
  .container {
    display:grid;
    grid-template-columns: 300px 1fr;
    height:100vh;
  }
  .sidebar {
    background:#020617;
    padding:16px;
    overflow-y:auto;
  }
  .main {
    background:#0b1120;
    padding:16px;
    display:flex;
    flex-direction:column;
  }
  .section-title {
    font-size:1.2rem;
    margin-bottom:8px;
  }
  .bot-card {
    background:#111827;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;
  }
  .chat-log {
    flex:1;
    overflow-y:auto;
    background:#020617;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
  }
  .msg-user { color:#a5b4fc; margin-bottom:6px; }
  .msg-ai { color:#22c55e; margin-bottom:6px; }
  input, select {
    width:100%;
    padding:8px;
    margin-bottom:8px;
    border-radius:6px;
    background:#1f2937;
    color:white;
    border:none;
  }
  button {
    padding:8px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
  }
</style>
</head>
<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="sidebar">
    <h2 class="section-title">Discover</h2>
    <div id="discover"></div>

    <hr style="margin:16px 0;">

    <h2 class="section-title">Your Bots</h2>
    <div id="botList"></div>

    <hr style="margin:16px 0;">

    <h2>Create Bot</h2>
    <input id="botName" placeholder="Bot name">
    <select id="botPersonality">
      <option value="neutral">Neutral</option>
      <option value="friendly">Friendly</option>
      <option value="serious">Serious</option>
    </select>
    <select id="botStoryMode">
      <option value="false">Story Mode Off</option>
      <option value="true">Story Mode On</option>
    </select>
    <input id="apiKey" placeholder="Groq API Key">
    <button id="createBotBtn">Create Bot</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="main">
    <h2 id="activeBotName">Select a bot</h2>
    <div class="chat-log" id="chatLog"></div>
    <input id="chatInput" placeholder="Say something...">
    <button id="sendBtn">Send</button>
  </div>

</div>

<script type="module">
  import { AIEngine } from './ai.js';

  const discoverEl = document.getElementById("discover");
  const botListEl = document.getElementById("botList");
  const chatLogEl = document.getElementById("chatLog");
  const activeBotNameEl = document.getElementById("activeBotName");

  const bots = {};
  let activeBot = null;

  function addDiscoverBots() {
    discoverEl.innerHTML = "";
    const sample = ["StoryWeaver", "DreamGuide", "NovaAI", "EchoMind"];
    sample.forEach(name => {
      const div = document.createElement("div");
      div.className = "bot-card";
      div.textContent = name;
      discoverEl.appendChild(div);
    });
  }

  addDiscoverBots();

  function renderBots() {
    botListEl.innerHTML = "";
    Object.values(bots).forEach(bot => {
      const div = document.createElement("div");
      div.className = "bot-card";
      div.textContent = bot.name;
      div.onclick = () => {
        activeBot = bot;
        activeBotNameEl.textContent = bot.name;
        chatLogEl.innerHTML = "";
      };
      botListEl.appendChild(div);
    });
  }

  document.getElementById("createBotBtn").onclick = () => {
    const name = document.getElementById("botName").value.trim();
    const personality = document.getElementById("botPersonality").value;
    const storyMode = document.getElementById("botStoryMode").value === "true";
    const apiKey = document.getElementById("apiKey").value.trim();

    if (!name || !apiKey) return alert("Bot name and API key required.");

    const engine = new AIEngine({ personality, storyMode, apiKey });

    bots[name] = {
      name,
      engine
    };

    renderBots();
  };

  function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = type === "user" ? "msg-user" : "msg-ai";
    div.textContent = (type === "user" ? "You: " : "Bot: ") + text;
    chatLogEl.appendChild(div);
    chatLogEl.scrollTop = chatLogEl.scrollHeight;
  }

  document.getElementById("sendBtn").onclick = async () => {
    if (!activeBot) return;

    const text = document.getElementById("chatInput").value.trim();
    if (!text) return;

    addMsg(text, "user");

    const reply = await activeBot.engine.respond(text);
    addMsg(reply, "ai");

    document.getElementById("chatInput").value = "";
  };
</script>

</body>
</html>
